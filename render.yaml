services:
  - type: worker
    name: perizia-worker
    runtime: docker
    dockerfilePath: ./worker/Dockerfile
    dockerContext: .
    plan: starter
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: AWS_REGION
        value: eu-central-1
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
